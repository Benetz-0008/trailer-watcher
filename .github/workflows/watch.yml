name: Watch Trailers

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Jalankan watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/watch.js

      - name: Commit seen.json kalau berubah
        run: |
          git config user.name "trailer-watcher-bot"
          git config user.email "actions@github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "update seen.json"
          git push
